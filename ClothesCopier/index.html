```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clothes Copier</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}

body,html{
font-family:'Roboto',sans-serif;
height:100%;
overflow:hidden;
background:#0b2a6f; /* jednolite tło */
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

canvas{
position:absolute;
top:0;
left:0;
z-index:0;
}

h1{
z-index:1;
color:white;
font-size:56px;
font-weight:700;
margin-bottom:50px;
letter-spacing:1px;
text-shadow:0 4px 12px rgba(0,0,0,0.5);
}

.main-wrapper{
position:relative;
z-index:1;
display:flex;
gap:40px;
}

.container{
background:rgba(255,255,255,0.95);
padding:20px;
border-radius:15px;
width:560px;
height:315px;
box-shadow:0 4px 20px rgba(0,0,0,0.25);
border:4px solid #ffffff;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.instructions{
font-size:14px;
color:#333;
text-align:center;
margin-bottom:12px;
line-height:1.4;
}

textarea{
width:90%;
height:100px;
margin-bottom:15px;
padding:8px;
border-radius:8px;
border:1px solid #ccc;
resize:none;
font-family:monospace;
background:#f7f7f7;
}

.start-btn{
padding:14px 45px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:12px;
cursor:pointer;
color:white;
background:linear-gradient(135deg,#0066ff,#00aaff);
box-shadow:
0 4px 10px rgba(0,0,0,0.3),
inset 0 1px 0 rgba(255,255,255,0.4);
transition:all .25s ease;
}

.start-btn:hover{
transform:scale(1.08);
box-shadow:
0 0 12px rgba(0,150,255,0.9),
0 4px 15px rgba(0,0,0,0.35);
}

.start-btn:active{
transform:scale(.96);
}

.spinner{
border:3px solid rgba(255,255,255,.3);
border-top:3px solid white;
border-radius:50%;
width:18px;
height:18px;
animation:spin 1s linear infinite;
display:inline-block;
margin-left:10px;
}

@keyframes spin{
to{transform:rotate(360deg)}
```
