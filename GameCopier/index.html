<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Release Panel</title>

<style>
body{
  font-family: Arial;
  background:#f2f2f2;
}

.container{
  width:500px;
  margin:80px auto;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

textarea{
  width:100%;
  height:120px;
  margin-bottom:10px;
}

button{
  padding:10px 20px;
  background:#0077ff;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

button:hover{
  background:#0055cc;
}
</style>
</head>

<body>

<div class="container">

<h2>Release Text</h2>

<textarea id="text"></textarea>

<button onclick="release()">Release</button>

<p id="status"></p>

</div>

<script>

async function release(){

  const text = document.getElementById("text").value;

  const res = await fetch("/api/release",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      text:text
    })
  });

  const data = await res.json();

  document.getElementById("status").innerText =
    JSON.stringify(data);
}

</script>

</body>
</html>
