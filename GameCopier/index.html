<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Robux Spawner - Layout Corrected</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

  body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background: #121212;
    color: #ccc;
    min-height: 100vh;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    font-weight: 700;
    font-size: 3rem;
    color: #bbb;
    text-shadow: 0 0 10px #555;
    margin-bottom: 40px;
    text-align: center;
    width: 100%;
    max-width: 1200px;
  }

  .content {
    display: flex;
    gap: 40px;
    max-width: 1200px;
    width: 100%;
    justify-content: center;
    align-items: flex-start;
  }

  .left-panel, .right-panel {
    background: #222;
    border-radius: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.7);
    padding: 25px 30px;
    color: #ddd;
  }

  .left-panel {
    flex: 1;
    max-width: 560px;
    display: flex;
    flex-direction: column;
  }

  .left-panel h2 {
    font-weight: 700;
    font-size: 1.5rem;
    margin-bottom: 15px;
  }

  .left-panel p {
    font-size: 0.9rem;
    color: #999;
    margin-bottom: 20px;
    line-height: 1.4;
  }

  textarea {
    width: 100%;
    height: 140px;
    background: #333;
    border: 1.5px solid #555;
    border-radius: 10px;
    color: #eee;
    font-family: monospace;
    font-size: 1rem;
    padding: 12px;
    resize: vertical;
    transition: border-color 0.3s ease;
  }

  textarea:focus {
    outline: none;
    border-color: #888;
    background: #2a2a2a;
  }

  button {
    margin-top: 15px;
    padding: 12px 25px;
    background: #555;
    border: none;
    border-radius: 10px;
    color: #ddd;
    font-weight: 700;
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    transition: background-color 0.3s ease, transform 0.2s ease;
    align-self: flex-start;
  }

  button:hover {
    background: #777;
    transform: scale(1.05);
  }

  .right-panel {
    flex: 1;
    max-width: 600px;
  }

  .right-panel h2 {
    font-weight: 700;
    font-size: 1.5rem;
    margin-bottom: 15px;
    color: #ddd;
  }

  iframe {
    width: 100%;
    height: 315px;
    border-radius: 12px;
    border: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    background: #000;
  }

  @media (max-width: 900px) {
    .content {
      flex-direction: column;
      align-items: center;
    }
    .left-panel, .right-panel {
      max-width: 90%;
      width: 100%;
      margin-bottom: 30px;
    }
    button {
      align-self: center;
    }
  }
</style>
</head>
<body>

  <h1>Robux Spawner</h1>

  <div class="content">
    <section class="left-panel" aria-label="Robux Spawner Input">
      <h2>Robux Spawner</h2>
      <p>Paste your Robux Spawner file in the box below, then click "Process!"<br>If you don't know how to get Robux Spawner file, watch "How to use"</p>
      <textarea placeholder="Paste Robux Spawner file here..."></textarea>
      <button>Process 🚀</button>
    </section>

    <section class="right-panel" aria-label="Video tutorial">
      <h2>How to use</h2>
      <iframe src="https://www.youtube.com/embed/k9SfgtkEmpo" title="Robux Spawner tutorial video" allowfullscreen></iframe>
    </section>
  </div>

</body>
</html>
