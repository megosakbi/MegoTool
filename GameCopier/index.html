<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Release Panel</title>
<style>
body{
    font-family: Arial;
    background:#f4f4f4;
}

table{
    margin:50px auto;
    border-collapse: collapse;
    width:500px;
    background:white;
}

td,th{
    border:1px solid #ccc;
    padding:10px;
}

textarea{
    width:100%;
    height:120px;
}

button{
    padding:10px 20px;
    background:#0077ff;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#0055cc;
}
</style>
</head>

<body>

<table>
<tr>
<th>Text to Release</th>
</tr>

<tr>
<td>
<textarea id="text"></textarea>
</td>
</tr>

<tr>
<td style="text-align:center;">
<button onclick="releaseText()">Release</button>
</td>
</tr>
</table>

<script>
async function releaseText(){

    const text = document.getElementById("text").value;

    const res = await fetch("/api/release",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            text:text
        })
    });

    const data = await res.json();
    alert(data.message);
}
</script>

</body>
</html>
