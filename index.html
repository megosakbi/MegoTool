<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CublaTools</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Rubik+Puddles&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
background:#05060a;
font-family:'Poppins',sans-serif;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
overflow:hidden;
}

#particles{
position:fixed;
top:0;
left:0;
z-index:-1;
}

h1{
font-family:'Rubik Puddles',cursive;
font-size:70px;
margin-bottom:70px;
background:linear-gradient(90deg,#00f0ff,#00ff9d,#6a5cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
filter:drop-shadow(0 0 20px rgba(0,255,200,0.6));
}

.container{
display:flex;
gap:35px;
flex-wrap:wrap;
justify-content:center;
}

.tool{
width:220px;
height:120px;
border-radius:18px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
text-decoration:none;
color:white;

background:linear-gradient(135deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(10px);

transition:0.35s;
position:relative;
overflow:hidden;
}

.tool::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:linear-gradient(45deg,#00f0ff,#6a5cff,#00ff9d,#00f0ff);
animation:rotate 6s linear infinite;
opacity:0.15;
}

@keyframes rotate{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.tool span{
font-size:20px;
font-weight:600;
z-index:2;
}

.tool .icon-img{
width:36px;
height:36px;
margin-bottom:8px;
z-index:2;
pointer-events:none;
}

.tool:hover{
transform:translateY(-8px) scale(1.05);
box-shadow:0 0 25px rgba(0,255,200,0.3),0 0 50px rgba(0,255,200,0.15);
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<h1>CublaTools</h1>

<div class="container">

<a href="/GameCopier/" class="tool">
<img src="assets/game.png" class="icon-img">
<span>Game Copier</span>
</a>

<a href="/ClothesCopier/" class="tool">
<img src="assets/clotea.png" class="icon-img">
<span>Clothes Copier</span>
</a>

<a href="/BotFollower/" class="tool">
<img src="assets/Robux.png" class="icon-img">
<span>Robux Spawner</span>
</a>

</div>

<script>

const canvas = document.getElementById("particles")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let particles=[]
let mouse={x:null,y:null}

for(let i=0;i<140;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.6,
vy:(Math.random()-0.5)*0.6
})
}

document.addEventListener("mousemove",e=>{
mouse.x=e.x
mouse.y=e.y
})

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let i=0;i<particles.length;i++){

let p=particles[i]

p.x+=p.vx
p.y+=p.vy

if(p.x<0||p.x>canvas.width)p.vx*=-1
if(p.y<0||p.y>canvas.height)p.vy*=-1

/* przyciąganie do myszy */

if(mouse.x){

let dx=mouse.x-p.x
let dy=mouse.y-p.y
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<160){

p.x+=dx*0.01
p.y+=dy*0.01

ctx.strokeStyle="rgba(0,255,200,0.25)"
ctx.beginPath()
ctx.moveTo(p.x,p.y)
ctx.lineTo(mouse.x,mouse.y)
ctx.stroke()

}

}

/* rysowanie kropki */

ctx.fillStyle="#00ffd5"
ctx.beginPath()
ctx.arc(p.x,p.y,2,0,Math.PI*2)
ctx.fill()

/* linie między kropkami */

for(let j=i+1;j<particles.length;j++){

let p2=particles[j]

let dx=p.x-p2.x
let dy=p.y-p2.y
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<120){

ctx.strokeStyle="rgba(0,255,200,0.15)"

ctx.beginPath()
ctx.moveTo(p.x,p.y)
ctx.lineTo(p2.x,p2.y)
ctx.stroke()

}

}

}

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
